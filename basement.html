<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Vault | Escape Room</title>
    <link rel="icon" type="image/png" href="assets/icons/analysis.png">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/inventory.css">
    <link rel="stylesheet" href="assets/css/puzzles.css">
</head>
<body class="bg-vault">
    <header id="game-header">
        <div class="timer-display">Time Remaining: <span id="time-left">--:--</span></div>
    </header>

    <main class="room-container">
        <h1>The Vault</h1>
        <p>A massive steel door blocks your exit. It requires a physical key and a voice-activated passcode.</p>

        <div class="vault-panel">
            <div class="keyhole-dropzone" id="vault-keyhole">Drop Key Here</div>
            <input type="text" id="vault-password" placeholder="Enter Passcode" disabled>
            <button id="unlock-vault-btn" disabled>Unlock Vault</button>
        </div>

        <button id="hint-btn" class="hint-btn" data-hint="You need a physical key for the slot, and the 4-letter password from the Study.">Request Hint (-1 Minute)</button>

        <div id="message-box" class="hidden"></div>

        <a href="study.html" class="nav-button">Back to Study</a>
    </main>

    <div id="inventory-bar"></div>

    <script src="assets/js/timer.js"></script>
    <script src="assets/js/inventory.js"></script>
    <script src="assets/js/puzzles.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.1/DragDropTouch.min.js"></script>
    <script src="assets/js/global-audio.js"></script>
</body>
</html>
