<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard | Escape Room</title>
    <link rel="icon" type="image/png" href="assets/icons/leaderboard.png">
    <link rel="stylesheet" href="assets/css/global.css">
    <link rel="stylesheet" href="assets/css/leaderboard.css">
</head>
<body class="bg-leaderboard">
    <main class="room-container" style="max-width: 800px;">
        <h1>Detective Archives</h1>
        <p>A record of those who attempted the mansion.</p>

        <table class="leaderboard-table">
            <thead>
                <tr>
                    <th>Detective Alias</th>
                    <th>Outcome</th>
                    <th>Time Remaining</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
            </tbody>
        </table>

        <a href="index.html" class="nav-button" style="margin-top: 20px;">Return to Foyer</a>
        <button id="clear-records-btn" style="background-color: #552222; margin-left: 10px;">Clear Archives</button>
    </main>

    <div id="custom-confirm-modal" class="hidden">
        <div class="modal-content">
            <h2 style="margin-top: 0; color: #ff6666;">Clear Archives?</h2>
            <p>Are you sure you want to permanently delete all player records? This cannot be undone.</p>
            <div class="modal-actions">
                <button id="modal-confirm-btn" style="background-color: #aa4444;">Yes, Delete</button>
                <button id="modal-cancel-btn" style="background-color: #444;">Cancel</button>
            </div>
        </div>
    </div>

    <script src="assets/js/leaderboard.js"></script>
</body>
</html>
