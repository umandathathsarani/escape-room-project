<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escaped! | Escape Room</title>
    <link rel="icon" type="image/png" href="assets/icons/success.png">
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body>
    <main class="room-container" style="border-color: #44aa44; box-shadow: 0 0 30px rgba(0, 255, 0, 0.2);">

        <p>The heavy vault doors swing open, revealing the cool night air.</p>

        <div style="margin: 30px 0; font-size: 20px;">
            Time Taken: <strong id="time-taken" style="color: var(--accent-color);">--:--</strong>
        </div>

        <button class="restart-btn">Play Again</button>
    </main>

    <script src="assets/js/endgame.js"></script>
