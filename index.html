<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Foyer | Escape Room</title>
    
    <link rel="icon" type="image/png" href="assets/icons/detective (3).png">
    
    <link rel="stylesheet" href="assets/css/global.css">
</head>
<body class="bg-foyer">
    <main class="room-container">
        <h1>The Foyer</h1>
        <p>The heavy mahogany doors slam shut behind you. The lock clicks into place.</p>
        <p>You have exactly <strong>15 minutes</strong> to uncover the secrets of this mansion and escape before the security system locks down completely.</p>
        
        <div class="start-form">
            <input type="text" id="playerName" placeholder="Enter your alias..." autocomplete="off">
            <button id="startGameBtn">Start Timer & Enter Library</button>
        </div>
    </main>

    <script src="assets/js/timer.js"></script>
</body>
</html>
